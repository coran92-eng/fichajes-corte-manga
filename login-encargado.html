<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Acceso Encargado - Fichaje</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            color: #f59e0b;
        }
        .login-icon i { width: 48px; height: 48px; }

        .login-header h1 { color: #1f2937; font-size: 24px; margin-bottom: 6px; }
        .login-header p { color: #6b7280; font-size: 14px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
        }

        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 48px; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px;
            display: flex;
            align-items: center;
            width: auto;
            border-radius: 4px;
        }
        .toggle-password i { width: 18px; height: 18px; }
        .toggle-password:hover { color: #374151; }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245,158,11,0.3);
        }
        .btn-login:active { transform: translateY(0); }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .message.error { background: #fee2e2; color: #7f1d1d; display: block; }
        .message.info  { background: #dbeafe; color: #0c2d6b; display: block; }
        .message.success { background: #d1fae5; color: #065f46; display: block; }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #f59e0b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .back-link a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
            .login-header h1 { font-size: 20px; }
        }

        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
            .login-container { background: #1f2937; }
            .login-header h1 { color: #e5e7eb; }
            .login-header p { color: #9ca3af; }
            label { color: #d1d5db; }
            input { background: #374151; color: #e5e7eb; border-color: #4b5563; }
            input:focus { border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(251,191,36,0.15); }
            .back-link a { color: #fbbf24; }
            .toggle-password { color: #6b7280; }
            .toggle-password:hover { color: #d1d5db; }
            .login-icon { color: #fbbf24; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <i data-lucide="calendar-check" aria-hidden="true"></i>
            </div>
            <h1>Acceso Encargado</h1>
            <p>Gestión de horarios semanales</p>
        </div>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input
                    type="text"
                    id="usuario"
                    placeholder="Tu nombre de usuario"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar contraseña">
                        <i data-lucide="eye" id="toggleIcon" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Volver a Fichaje</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();

            // Si ya tiene sesión de encargado, redirigir directamente
            if (sessionStorage.getItem('encargadoToken') === 'auth-token-fichaje-encargado') {
                window.location.href = 'horario-encargado.html';
                return;
            }

            const toggleBtn = document.getElementById('togglePassword');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    const input = document.getElementById('password');
                    const icon = document.getElementById('toggleIcon');
                    const visible = input.type === 'text';
                    input.type = visible ? 'password' : 'text';
                    if (icon) icon.setAttribute('data-lucide', visible ? 'eye' : 'eye-off');
                    toggleBtn.setAttribute('aria-label', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                });
            }

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const usuario = document.getElementById('usuario').value.trim();
                const password = document.getElementById('password').value;
                const btn = document.querySelector('.btn-login');

                if (!usuario || !password) {
                    mostrarMensaje('Completa usuario y contraseña', 'error');
                    return;
                }

                btn.disabled = true;
                btn.style.opacity = '0.6';
                mostrarMensaje('Autenticando...', 'info');

                try {
                    const res = await fetch('/api/auth-encargado', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ usuario, password })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        mostrarMensaje(data.error || 'Credenciales incorrectas', 'error');
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        return;
                    }

                    sessionStorage.setItem('encargadoToken', data.token);
                    sessionStorage.setItem('encargadoNombre', data.nombre);
                    mostrarMensaje('✓ Acceso correcto. Redirigiendo...', 'success');
                    setTimeout(() => { window.location.href = 'horario-encargado.html'; }, 600);

                } catch {
                    mostrarMensaje('Error de conexión. Inténtalo de nuevo.', 'error');
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }
            });
        });

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById('message');
            el.textContent = texto;
            el.className = `message ${tipo}`;
        }
    </script>
</body>
</html>
