<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Sistema de fichaje con NFC">
    <title>Fichaje - Camareros</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232563eb' width='192' height='192'/><text x='96' y='120' font-size='80' fill='white' text-anchor='middle' font-weight='bold'>F</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #6b7280;
            font-size: 14px;
        }

        .nfc-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-entrada {
            background: #10b981;
            color: white;
            grid-column: 1;
        }

        .btn-entrada:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-salida {
            background: #ef4444;
            color: white;
            grid-column: 2;
        }

        .btn-salida:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .button-group-descanso {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-descanso-ini {
            background: #f59e0b;
            color: white;
        }

        .btn-descanso-ini:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-descanso-fin {
            background: #3b82f6;
            color: white;
        }

        .btn-descanso-fin:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-admin {
            width: 100%;
            background: #6b7280;
            color: white;
            margin-top: 10px;
        }

        .btn-admin:hover {
            background: #4b5563;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: #7f1d1d;
            display: block;
        }

        .message.info {
            background: #dbeafe;
            color: #0c2d6b;
            display: block;
        }

        .last-action {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }

        .last-action.has-data {
            color: #374151;
            background: #f3f4f6;
        }

        .time-display {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        .nfc-status {
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
        }

        .nfc-status.supported {
            background: #d1fae5;
            color: #065f46;
        }

        .nfc-status.not-supported {
            background: #fee2e2;
            color: #7f1d1d;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 8px;
            }

            .header h1 {
                font-size: 24px;
            }

            button {
                padding: 12px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nfc-icon">📱</div>
            <h1>Sistema de Fichaje</h1>
            <p>Selecciona tu nombre y registra tu entrada/salida</p>
        </div>

        <div id="nfcStatus" class="nfc-status"></div>
        <div id="message" class="message"></div>

        <div class="form-group">
            <label for="empleado">Empleado</label>
            <select id="empleado" required>
                <option value="">-- Selecciona tu nombre --</option>
            </select>
        </div>

        <div class="time-display" id="timeDisplay">--:--:--</div>

        <div class="button-group">
            <button class="btn-entrada" id="btnEntrada">Entrada</button>
            <button class="btn-salida" id="btnSalida">Salida</button>
        </div>

        <div class="button-group-descanso">
            <button class="btn-descanso-ini" id="btnDescansoIni">Inicio Descanso</button>
            <button class="btn-descanso-fin" id="btnDescansoFin">Fin Descanso</button>
        </div>

        <button class="btn-admin" id="btnAdmin">📊 Ver Reportes</button>

        <div class="last-action" id="lastAction">
            Aquí aparecerá tu último registro
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        // Registrar Service Worker para offline (mantener fuera del módulo para scope global)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registrado'))
                .catch(err => console.log('Error registrando SW:', err));
        }

        // Monitorear conexión
        window.addEventListener('online', () => {
            const nfcStatus = document.getElementById('nfcStatus');
            if (nfcStatus) nfcStatus.innerHTML += '<br><span style="color:#10b981">✓ Conexión restaurada</span>';
        });
        window.addEventListener('offline', () => {
            const nfcStatus = document.getElementById('nfcStatus');
            if (nfcStatus) nfcStatus.innerHTML += '<br><span style="color:#ef4444">⚠ Sin conexión (modo offline)</span>';
        });
    </script>
</body>
</html>
