<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Sistema de fichaje con NFC">
    <title>Fichaje - Camareros</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232563eb' width='192' height='192'/><text x='96' y='120' font-size='80' fill='white' text-anchor='middle' font-weight='bold'>F</text></svg>">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #6b7280;
            font-size: 14px;
        }

        .nfc-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: #2563eb;
        }
        .nfc-icon i { width: 40px; height: 40px; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-entrada {
            background: #10b981;
            color: white;
            grid-column: 1;
        }

        .btn-entrada:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-salida {
            background: #ef4444;
            color: white;
            grid-column: 2;
        }

        .btn-salida:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .button-group-descanso {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-descanso-ini {
            background: #f59e0b;
            color: white;
        }

        .btn-descanso-ini:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-descanso-fin {
            background: #3b82f6;
            color: white;
        }

        .btn-descanso-fin:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .admin-sep {
            border-top: 1px solid #e5e7eb;
            margin: 10px 0;
        }
        .btn-admin {
            width: 100%;
            background: none;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            margin-top: 0;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
        }
        .btn-admin:hover {
            background: #f9fafb;
            color: #374151;
            border-color: #d1d5db;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: #7f1d1d;
            display: block;
        }

        .message.info {
            background: #dbeafe;
            color: #0c2d6b;
            display: block;
        }

        .last-action {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }

        .last-action.has-data {
            color: #374151;
            background: #f3f4f6;
        }

        .time-display {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
            margin: 10px 0;
            font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
        }

        .nfc-status {
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
        }

        .nfc-status.supported {
            background: #d1fae5;
            color: #065f46;
        }

        .nfc-status.not-supported {
            background: #fee2e2;
            color: #7f1d1d;
        }

        .centro-badge {
            display: none;
            background: #2563eb;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 6px;
        }

        /* Selector de centro */
        #selectorCentro {
            display: flex;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        #selectorCentro.visible {
            opacity: 1;
            pointer-events: all;
        }

        #selectorCentro h2 {
            color: white;
            font-size: 24px;
            text-align: center;
        }

        #selectorCentro p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            text-align: center;
        }

        #listaCentros {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .btn-centro {
            padding: 16px 24px;
            background: white;
            color: #2563eb;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-centro:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 8px;
            }

            .header h1 {
                font-size: 24px;
            }

            button {
                padding: 12px 16px;
                font-size: 13px;
            }
        }

        /* Panel turno activo */
        .turno-panel {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }

        .turno-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .turno-title {
            font-size: 13px;
            font-weight: 700;
            color: #065f46;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .turno-count {
            font-size: 12px;
            color: #6b7280;
            font-weight: 500;
        }

        .turno-lista {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .turno-card {
            background: white;
            border-radius: 8px;
            padding: 10px 12px;
            border-left: 3px solid #10b981;
        }

        .turno-card--descanso { border-left-color: #f59e0b; }
        .turno-card--warning  { border-left-color: #ef4444; background: #fff7f7; }

        .turno-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .turno-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .turno-dot--activo  { background: #10b981; }
        .turno-dot--descanso { background: #f59e0b; }
        .turno-dot--warning  { background: #ef4444; }

        .turno-nombre {
            font-size: 14px;
            font-weight: 700;
            color: #1f2937;
            flex: 1;
        }

        .turno-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .turno-badge--activo  { background: #d1fae5; color: #065f46; }
        .turno-badge--descanso { background: #fef3c7; color: #92400e; }
        .turno-badge--warning  { background: #fee2e2; color: #b91c1c; }

        .turno-detalle {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding-left: 16px;
        }

        .turno-linea {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .turno-linea-label {
            color: #9ca3af;
            min-width: 90px;
            font-weight: 500;
        }

        .turno-linea-val {
            color: #374151;
            font-family: ui-monospace, 'SF Mono', monospace;
            font-weight: 600;
        }

        .turno-linea--warning .turno-linea-val { color: #b91c1c; }

        .turno-linea-dur { color: #9ca3af; font-size: 11px; }
        .turno-linea-dur--warning { color: #ef4444; font-weight: 700; }

        @media (prefers-color-scheme: dark) {
            .turno-panel { background: #022c22; border-color: #064e3b; }
            .turno-title { color: #6ee7b7; }
            .turno-count { color: #9ca3af; }
            .turno-card { background: #1f2937; }
            .turno-card--warning { background: #2d1515; }
            .turno-nombre { color: #e5e7eb; }
            .turno-badge--activo  { background: #064e3b; color: #6ee7b7; }
            .turno-badge--descanso { background: #451a03; color: #fcd34d; }
            .turno-badge--warning  { background: #450a0a; color: #f87171; }
            .turno-linea-label { color: #6b7280; }
            .turno-linea-val { color: #d1d5db; }
            .turno-linea--warning .turno-linea-val { color: #f87171; }
        }

        .estado-badge {
            font-size: 13px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 20px;
            margin: 8px auto 0;
            display: inline-block;
        }
        .estado-badge.en-turno  { background: #d1fae5; color: #065f46; }
        .estado-badge.en-descanso { background: #fef3c7; color: #92400e; }
        .estado-badge.fuera     { background: #f3f4f6; color: #6b7280; }

        .horario-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 4px auto 0;
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
        }
        @media (prefers-color-scheme: dark) {
            .horario-badge { background: #1e3a5f; color: #93c5fd; }
        }

        .undo-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1f2937;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 500;
            white-space: nowrap;
        }
        .undo-toast.visible { transform: translateX(-50%) translateY(0); }
        .undo-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.4);
            color: #60a5fa;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: none;
            letter-spacing: 0;
        }
        .undo-btn:hover { background: rgba(255,255,255,0.1); }

        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
            .container { background: #1f2937; }
            .header h1 { color: #e5e7eb; }
            .header p { color: #9ca3af; }
            label { color: #d1d5db; }
            input, select { background: #374151; color: #e5e7eb; border-color: #4b5563; }
            input:focus, select:focus { border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.1); }
            .time-display { color: #e5e7eb; }
            .last-action { background: #374151; color: #9ca3af; }
            .last-action.has-data { background: #2d3748; color: #d1d5db; }
            .admin-sep { border-color: #4b5563; }
            .btn-admin { border-color: #4b5563; color: #9ca3af; }
            .btn-admin:hover { background: #374151; color: #d1d5db; border-color: #6b7280; }
            .nfc-status.supported { background: #064e3b; color: #6ee7b7; }
            .estado-badge.fuera { background: #374151; color: #9ca3af; }
            .nfc-icon { color: #60a5fa; }
        }
    </style>
</head>
<body>
    <!-- Selector de centro -->
    <div id="selectorCentro">
        <h2>Sistema de Fichaje</h2>
        <p>Selecciona tu centro de trabajo</p>
        <div id="listaCentros"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="nfc-icon"><i data-lucide="smartphone" aria-hidden="true"></i></div>
            <h1>Sistema de Fichaje</h1>
            <span class="centro-badge" id="centroBadge"></span>
            <div class="estado-badge" id="estadoBadge" style="display:none"></div>
            <div class="horario-badge" id="horarioBadge" style="display:none"></div>
            <p>Selecciona tu nombre y registra tu entrada/salida</p>
        </div>

        <div id="nfcStatus" class="nfc-status"></div>
        <div id="message" class="message"></div>

        <div class="form-group">
            <label for="empleado">Empleado</label>
            <input type="text" id="empleado" list="empleados-list"
                   placeholder="Escribe o selecciona tu nombre..."
                   autocomplete="off" required>
            <datalist id="empleados-list"></datalist>
        </div>

        <div class="time-display" id="timeDisplay">--:--:--</div>

        <div class="button-group">
            <button class="btn-entrada" id="btnEntrada">Entrada</button>
            <button class="btn-salida" id="btnSalida">Salida</button>
        </div>

        <!-- Panel turno activo (solo visible si hay centro seleccionado) -->
        <div class="turno-panel" id="turnoPanel" style="display:none">
            <div class="turno-header">
                <span class="turno-title">En local ahora</span>
                <span class="turno-count" id="turnoCount"></span>
            </div>
            <div class="turno-lista" id="turnoLista"></div>
        </div>

        <div class="button-group-descanso">
            <button class="btn-descanso-ini" id="btnDescansoIni">Inicio Descanso</button>
            <button class="btn-descanso-fin" id="btnDescansoFin">Fin Descanso</button>
        </div>

        <div class="admin-sep"></div>
        <button class="btn-admin" id="btnAdmin">
            <i data-lucide="bar-chart-2" aria-hidden="true" style="width:16px;height:16px"></i>
            Ver Reportes
        </button>

        <div class="last-action" id="lastAction">
            Aquí aparecerá tu último registro
        </div>
    </div>

    <div class="undo-toast" id="undoToast" role="status" aria-live="polite">
        <span id="undoMsg">Registro guardado</span>
        <button id="btnUndo" class="undo-btn" type="button">Deshacer</button>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
        // Registrar Service Worker para offline (mantener fuera del módulo para scope global)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registrado'))
                .catch(err => console.log('Error registrando SW:', err));
        }

        // Monitorear conexión
        window.addEventListener('online', () => {
            const nfcStatus = document.getElementById('nfcStatus');
            if (nfcStatus) nfcStatus.innerHTML += '<br><span style="color:#10b981">✓ Conexión restaurada</span>';
        });
        window.addEventListener('offline', () => {
            const nfcStatus = document.getElementById('nfcStatus');
            if (nfcStatus) nfcStatus.innerHTML += '<br><span style="color:#ef4444">⚠ Sin conexión (modo offline)</span>';
        });
    </script>
</body>
</html>
