<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Reportes - Fichaje</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Modo oscuro
        const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefiereOscuro) {
            document.body.style.background = '#1f2937';
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100dvh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #1f2937;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-volver {
            background: #6b7280;
            color: white;
        }

        .btn-volver:hover {
            background: #4b5563;
        }

        .btn-export {
            background: #10b981;
            color: white;
        }

        .btn-export:hover {
            background: #059669;
        }

        .btn-limpiar {
            background: #ef4444;
            color: white;
        }

        .btn-limpiar:hover {
            background: #dc2626;
        }

        .btn-logout {
            background: #8b5cf6;
            color: white;
        }

        .btn-logout:hover {
            background: #7c3aed;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            overflow-x: auto;
            padding-bottom: 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #6b7280;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .tab-btn:hover {
            color: #1f2937;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        thead {
            background: #f3f4f6;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        th {
            font-weight: 600;
            color: #374151;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        .fecha {
            color: #6b7280;
            font-size: 13px;
        }

        .hora {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #1f2937;
        }

        .tipo {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tipo.entrada {
            background: #d1fae5;
            color: #065f46;
        }

        .tipo.salida {
            background: #fee2e2;
            color: #7f1d1d;
        }

        .tipo.inicio_descanso {
            background: #fef3c7;
            color: #92400e;
        }

        .tipo.fin_descanso {
            background: #dbeafe;
            color: #0c2d6b;
        }

        .aviso-descanso {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
        }

        .aviso-descanso.visible {
            display: block;
        }

        .aviso-titulo {
            font-weight: 600;
            color: #92400e;
            margin-bottom: 5px;
        }

        .aviso-detalle {
            font-size: 13px;
            color: #78350f;
        }

        .duracion-descanso {
            font-size: 12px;
            font-weight: 600;
            color: #f59e0b;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #6b7280;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: #7f1d1d;
            display: block;
        }

        /* Modo Oscuro */
        @media (prefers-color-scheme: dark) {
            body {
                background: #111827;
            }

            .container {
                background: #1f2937;
                color: #e5e7eb;
            }

            .header h1 {
                color: #e5e7eb;
            }

            th, label {
                color: #e5e7eb;
            }

            table {
                color: #d1d5db;
            }

            .hora {
                color: #e5e7eb;
            }

            .fecha {
                color: #9ca3af;
            }

            thead {
                background: #374151;
            }

            tbody tr:hover {
                background: #2d3748;
            }

            input, select {
                background: #374151;
                color: #e5e7eb;
                border-color: #4b5563;
            }

            input:focus, select:focus {
                border-color: #60a5fa;
                box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
            }
        }

        /* Búsqueda y Filtros */
        .filtros {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        @media (prefers-color-scheme: dark) {
            .filtros {
                background: #374151;
            }
        }

        .filtro-grupo {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filtro-grupo label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
        }

        @media (prefers-color-scheme: dark) {
            .filtro-grupo label {
                color: #9ca3af;
            }
        }

        .filtro-grupo input {
            padding: 8px;
            font-size: 14px;
        }

        .btn-limpiar-filtros {
            align-self: flex-end;
            background: #6b7280;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-limpiar-filtros:hover {
            background: #4b5563;
        }

        /* Modal de confirmación */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            text-align: center;
        }

        @media (prefers-color-scheme: dark) {
            .modal-content {
                background: #1f2937;
                color: #e5e7eb;
            }
        }

        .modal-titulo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1f2937;
        }

        @media (prefers-color-scheme: dark) {
            .modal-titulo {
                color: #e5e7eb;
            }
        }

        .modal-mensaje {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 20px;
        }

        @media (prefers-color-scheme: dark) {
            .modal-mensaje {
                color: #d1d5db;
            }
        }

        .modal-botones {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-botones button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        .btn-modal-cancel {
            background: #e5e7eb;
            color: #1f2937;
        }

        .btn-modal-cancel:hover {
            background: #d1d5db;
        }

        .btn-modal-confirmar {
            background: #ef4444;
            color: white;
        }

        .btn-modal-confirmar:hover {
            background: #dc2626;
        }

        /* Panel de configuración */
        .panel-config {
            display: none;
            background: #f0f9ff;
            border: 2px solid #bae6fd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .panel-config.visible { display: block; }

        .panel-config h3 { color: #0c4a6e; font-size: 16px; margin-bottom: 15px; }

        .config-fila {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }

        .config-fila label {
            font-size: 12px;
            font-weight: 600;
            color: #0369a1;
        }

        .config-fila input {
            padding: 10px 14px;
            border: 2px solid #bae6fd;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            width: 100%;
        }

        .config-fila input:focus {
            outline: none;
            border-color: #0284c7;
        }

        .config-botones { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-guardar-config { background: #0284c7; color: white; }
        .btn-guardar-config:hover { background: #0369a1; }

        .btn-test-webhook { background: #6b7280; color: white; }
        .btn-test-webhook:hover { background: #4b5563; }

        .btn-sync { background: #10b981; color: white; }
        .btn-sync:hover { background: #059669; }
        .btn-sync:disabled { opacity: 0.6; cursor: not-allowed; }

        .webhook-estado {
            font-size: 12px;
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            display: none;
        }
        .webhook-estado.ok { background: #d1fae5; color: #065f46; display: block; }
        .webhook-estado.error { background: #fee2e2; color: #7f1d1d; display: block; }
        .webhook-estado.loading { background: #dbeafe; color: #1e40af; display: block; }

        @media (prefers-color-scheme: dark) {
            .panel-config { background: #1e3a5f; border-color: #1e40af; }
            .panel-config h3 { color: #93c5fd; }
            .config-fila label { color: #60a5fa; }
            .config-fila input { background: #1f2937; color: #e5e7eb; border-color: #1e40af; }
        }

        /* Panel de empleados */
        .panel-empleados {
            display: none;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .panel-empleados.visible {
            display: block;
        }

        .panel-empleados h3 {
            color: #1f2937;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .empleados-lista {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            min-height: 36px;
        }

        .empleado-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .empleado-tag .empleado-centro {
            font-size: 11px;
            padding: 2px 6px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #f9fafb;
            color: #374151;
            font-family: inherit;
            cursor: pointer;
            width: auto;
        }

        @media (prefers-color-scheme: dark) {
            .empleado-tag .empleado-centro {
                background: #374151;
                color: #e5e7eb;
                border-color: #4b5563;
            }
        }

        .empleado-tag button {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            line-height: 1;
            font-weight: bold;
            transition: color 0.2s;
        }

        .empleado-tag button:hover {
            color: #b91c1c;
        }

        .form-nuevo-empleado {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .form-nuevo-empleado input {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-nuevo-empleado input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-agregar-empleado {
            background: #10b981;
            color: white;
            padding: 10px 18px;
            white-space: nowrap;
        }

        .btn-agregar-empleado:hover {
            background: #059669;
        }

        .btn-empleados {
            background: #f59e0b;
            color: white;
        }

        .btn-empleados:hover {
            background: #d97706;
        }

        @media (prefers-color-scheme: dark) {
            .panel-empleados {
                background: #374151;
                border-color: #4b5563;
            }
            .panel-empleados h3 { color: #e5e7eb; }
            .empleado-tag {
                background: #1f2937;
                border-color: #4b5563;
                color: #e5e7eb;
            }
            .form-nuevo-empleado input {
                background: #4b5563;
                color: #e5e7eb;
                border-color: #6b7280;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .tipo {
                font-size: 11px;
                padding: 3px 6px;
            }

            .filtros {
                grid-template-columns: 1fr;
            }
        }

        .header-buttons { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .header-buttons button { display: flex; align-items: center; gap: 6px; }
        .overflow-menu { position: relative; }
        .btn-overflow {
            background: #f3f4f6;
            color: #374151;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-overflow:hover { background: #e5e7eb; }
        .overflow-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            min-width: 185px;
            z-index: 200;
            padding: 6px;
        }
        .overflow-dropdown.visible { display: block; }
        .overflow-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 6px;
            background: none;
            color: #374151;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        .overflow-item:hover { background: #f3f4f6; }
        .overflow-item--danger { color: #ef4444; }
        .overflow-item--danger:hover { background: #fee2e2; }
        .overflow-separator { border-top: 1px solid #e5e7eb; margin: 4px 0; }
        #tabsContent { overflow-x: auto; }

        @media (prefers-color-scheme: dark) {
            .stat-card { background: #374151; }
            .stat-value { color: #60a5fa; }
            .stat-label { color: #9ca3af; }
            .btn-overflow { background: #374151; color: #e5e7eb; }
            .btn-overflow:hover { background: #4b5563; }
            .overflow-dropdown { background: #1f2937; border-color: #374151; }
            .overflow-item { color: #d1d5db; }
            .overflow-item:hover { background: #374151; }
            .overflow-separator { border-color: #4b5563; }
            .overflow-item--danger { color: #f87171; }
            .overflow-item--danger:hover { background: #450a0a; }
        }

        .panel-horarios {
            display: none;
            background: #f0f9ff;
            border: 2px solid #bae6fd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .panel-horarios.visible { display: block; }
        .panel-horarios h3 { color: #0c4a6e; font-size: 16px; }

        .horario-grupo {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 14px;
            margin-bottom: 12px;
        }
        .horario-grupo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .horario-grupo-titulo {
            font-weight: 700;
            font-size: 14px;
            color: #1f2937;
        }
        .horario-grupo-acciones { display: flex; gap: 8px; }
        .btn-validar { background: #10b981; color: white; padding: 6px 14px; font-size: 12px; }
        .btn-validar:hover { background: #059669; }
        .btn-rechazar { background: #ef4444; color: white; padding: 6px 14px; font-size: 12px; }
        .btn-rechazar:hover { background: #dc2626; }

        .horario-tabla { width: 100%; border-collapse: collapse; font-size: 12px; }
        .horario-tabla th, .horario-tabla td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; text-align: left; }
        .horario-tabla thead { background: #f9fafb; }
        .horario-tabla th { font-weight: 600; color: #6b7280; font-size: 11px; text-transform: uppercase; }

        .badge-estado { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pendiente { background: #fef3c7; color: #92400e; }
        .badge-validado { background: #d1fae5; color: #065f46; }
        .badge-rechazado { background: #fee2e2; color: #7f1d1d; }
        .badge-aprobada { background: #d1fae5; color: #065f46; }
        .badge-rechazada { background: #fee2e2; color: #7f1d1d; }

        .sol-cambio { font-family: monospace; font-size: 12px; }
        .sol-cambio del { color: #b91c1c; text-decoration: line-through; }
        .sol-cambio ins { color: #047857; text-decoration: none; font-weight: 700; }
        .sol-motivo { color: #6b7280; font-size: 12px; font-style: italic; }
        @media (prefers-color-scheme: dark) { .sol-motivo { color: #9ca3af; } }

        @media (prefers-color-scheme: dark) {
            .panel-horarios { background: #1e3a5f; border-color: #1e40af; }
            .panel-horarios h3 { color: #93c5fd; }
            .horario-grupo { background: #1f2937; border-color: #374151; }
            .horario-grupo-titulo { color: #e5e7eb; }
            .horario-tabla th { color: #9ca3af; }
            .horario-tabla th, .horario-tabla td { border-color: #374151; }
            .horario-tabla thead { background: #374151; }
            #filtroEstadoHorario { background: #374151; color: #e5e7eb; border-color: #4b5563; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i data-lucide="bar-chart-2" aria-hidden="true" style="width:24px;height:24px;vertical-align:middle;margin-right:8px"></i>
                Reportes de Fichaje
            </h1>
            <div class="header-buttons">
                <button class="btn-export" id="btnExportarExcel" aria-label="Exportar a Excel">
                    <i data-lucide="download" aria-hidden="true" style="width:15px;height:15px"></i> Exportar Excel
                </button>
                <button class="btn-export" id="btnHorasSemana" style="background:#8b5cf6" aria-label="Ver horas por semana">
                    <i data-lucide="clock" aria-hidden="true" style="width:15px;height:15px"></i> Horas Semana
                </button>
                <button class="btn-empleados" id="btnEmpleados" aria-label="Gestionar empleados">
                    <i data-lucide="users" aria-hidden="true" style="width:15px;height:15px"></i> Empleados
                </button>
                <button class="btn-horarios" id="btnHorarios" aria-label="Gestionar horarios">
                    <i data-lucide="calendar" aria-hidden="true" style="width:15px;height:15px"></i> Horarios
                </button>
                <button class="btn-horarios" id="btnSolicitudes" style="background:#0ea5e9" aria-label="Solicitudes de corrección">
                    <i data-lucide="alarm-clock" aria-hidden="true" style="width:15px;height:15px"></i> Solicitudes
                </button>
                <div class="overflow-menu">
                    <button class="btn-overflow" id="btnOverflow" aria-label="Más opciones" aria-haspopup="true" aria-expanded="false">
                        <i data-lucide="more-horizontal" aria-hidden="true" style="width:18px;height:18px"></i>
                    </button>
                    <div class="overflow-dropdown" id="overflowDropdown" role="menu">
                        <button class="overflow-item" id="btnConfig" role="menuitem">
                            <i data-lucide="settings" aria-hidden="true" style="width:15px;height:15px"></i> Configuración
                        </button>
                        <button class="overflow-item" id="btnVolver" role="menuitem">
                            <i data-lucide="arrow-left" aria-hidden="true" style="width:15px;height:15px"></i> Volver a Fichaje
                        </button>
                        <button class="overflow-item" id="btnLogout" role="menuitem">
                            <i data-lucide="log-out" aria-hidden="true" style="width:15px;height:15px"></i> Cerrar Sesión
                        </button>
                        <div class="overflow-separator"></div>
                        <button class="overflow-item overflow-item--danger" id="btnLimpiar" role="menuitem">
                            <i data-lucide="trash-2" aria-hidden="true" style="width:15px;height:15px"></i> Limpiar datos
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="message" class="message" role="alert" aria-live="polite" aria-atomic="true"></div>

        <!-- Panel de configuración -->
        <div class="panel-config" id="panelConfig">
            <h3><i data-lucide="settings" aria-hidden="true" style="width:16px;height:16px;vertical-align:middle;margin-right:6px"></i>Configuración</h3>
            <div class="config-fila">
                <label for="inputWebhook">URL de Google Apps Script (para sincronizar con Sheets)</label>
                <input type="url" id="inputWebhook" placeholder="https://script.google.com/macros/s/.../exec">
                <div class="webhook-estado" id="webhookEstado"></div>
            </div>
            <div class="config-botones">
                <button class="btn-guardar-config" id="btnGuardarConfig"><i data-lucide="save" aria-hidden="true" style="width:14px;height:14px"></i> Guardar URL</button>
                <button class="btn-test-webhook" id="btnTestWebhook"><i data-lucide="link-2" aria-hidden="true" style="width:14px;height:14px"></i> Probar conexión</button>
                <button class="btn-sync" id="btnSyncTodo"><i data-lucide="cloud" aria-hidden="true" style="width:14px;height:14px"></i> Sincronizar con Sheets</button>
            </div>
        </div>

        <!-- Panel gestión de empleados -->
        <div class="panel-empleados" id="panelEmpleados">
            <h3><i data-lucide="users" aria-hidden="true" style="width:16px;height:16px;vertical-align:middle;margin-right:6px"></i>Gestión de Empleados</h3>
            <div class="empleados-lista" id="empleadosLista"></div>
            <form class="form-nuevo-empleado" id="formNuevoEmpleado">
                <input type="text" id="inputNuevoEmpleado" placeholder="Nombre del nuevo empleado" maxlength="40" autocomplete="off">
                <select id="selectCentroEmpleado" style="flex:1;min-width:130px;padding:10px 14px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;">
                    <option value="">Sin asignar</option>
                </select>
                <button type="submit" class="btn-agregar-empleado">+ Añadir</button>
            </form>
        </div>

        <!-- Panel gestión de horarios -->
        <div class="panel-horarios" id="panelHorarios">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:10px">
                <h3 style="margin:0"><i data-lucide="calendar" aria-hidden="true" style="width:16px;height:16px;vertical-align:middle;margin-right:6px"></i>Horarios para validar</h3>
                <div style="display:flex;gap:8px;align-items:center">
                    <select id="filtroEstadoHorario" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px">
                        <option value="pendiente">Pendientes</option>
                        <option value="validado">Validados</option>
                        <option value="rechazado">Rechazados</option>
                    </select>
                    <button class="btn-horarios-reload" id="btnRecargarHorarios" style="background:#6b7280;color:white;padding:6px 12px;font-size:12px">↻ Recargar</button>
                </div>
            </div>
            <div id="horariosContenido">
                <p style="color:#9ca3af;font-size:13px">Selecciona un estado para ver los horarios.</p>
            </div>
            <div style="margin-top:12px">
                <button class="btn-export" id="btnIrEncargado" style="background:#8b5cf6;font-size:13px">
                    <i data-lucide="edit-3" style="width:14px;height:14px"></i> Crear horario
                </button>
            </div>
        </div>

        <!-- Panel solicitudes de corrección -->
        <div class="panel-horarios" id="panelSolicitudes">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:10px">
                <h3 style="margin:0"><i data-lucide="alarm-clock" aria-hidden="true" style="width:16px;height:16px;vertical-align:middle;margin-right:6px"></i>Solicitudes de corrección</h3>
                <div style="display:flex;gap:8px;align-items:center">
                    <select id="filtroEstadoSolicitud" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px">
                        <option value="pendiente">Pendientes</option>
                        <option value="aprobada">Aprobadas</option>
                        <option value="rechazada">Rechazadas</option>
                    </select>
                    <button id="btnRecargarSolicitudes" style="background:#6b7280;color:white;padding:6px 12px;font-size:12px">↻ Recargar</button>
                </div>
            </div>
            <div id="solicitudesContenido">
                <p style="color:#9ca3af;font-size:13px">Selecciona un estado para ver las solicitudes.</p>
            </div>
        </div>

        <div class="stats" id="stats"></div>

        <!-- Filtros -->
        <div class="filtros" role="search" aria-label="Filtros de búsqueda">
            <div class="filtro-grupo">
                <label for="filtroCentro"><i data-lucide="building-2" aria-hidden="true" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i>Centro</label>
                <select id="filtroCentro" aria-label="Filtrar por centro de trabajo">
                    <option value="">Todos los centros</option>
                </select>
            </div>
            <div class="filtro-grupo">
                <label for="filtroEmpleado"><i data-lucide="search" aria-hidden="true" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i>Buscar empleado</label>
                <input type="text" id="filtroEmpleado" placeholder="Nombre..." aria-label="Filtrar por nombre de empleado">
            </div>
            <div class="filtro-grupo">
                <label for="filtroFechaDesde"><i data-lucide="calendar" aria-hidden="true" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i>Desde</label>
                <input type="date" id="filtroFechaDesde" aria-label="Fecha inicial del filtro">
            </div>
            <div class="filtro-grupo">
                <label for="filtroFechaHasta"><i data-lucide="calendar" aria-hidden="true" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i>Hasta</label>
                <input type="date" id="filtroFechaHasta" aria-label="Fecha final del filtro">
            </div>
            <button class="btn-limpiar-filtros" id="btnLimpiarFiltros" aria-label="Limpiar todos los filtros">Limpiar filtros</button>
        </div>

        <nav class="tabs" id="tabs" role="tablist" aria-label="Pestañas de reportes"></nav>

        <div id="tabsContent" role="tabpanel"></div>
    </div>

    <!-- Modal de confirmación -->
    <div class="modal" id="modalConfirmacion">
        <div class="modal-content" tabindex="-1">
            <div class="modal-titulo" id="modalTitulo"></div>
            <div class="modal-mensaje" id="modalMensaje"></div>
            <div class="modal-botones">
                <button class="btn-modal-cancel" id="btnModalCancel">Cancelar</button>
                <button class="btn-modal-confirmar" id="btnModalConfirmar">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();

            const btnOverflow = document.getElementById('btnOverflow');
            const dropdown = document.getElementById('overflowDropdown');
            if (btnOverflow && dropdown) {
                btnOverflow.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const open = dropdown.classList.toggle('visible');
                    btnOverflow.setAttribute('aria-expanded', open ? 'true' : 'false');
                });
                document.addEventListener('click', () => {
                    dropdown.classList.remove('visible');
                    btnOverflow.setAttribute('aria-expanded', 'false');
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        dropdown.classList.remove('visible');
                        btnOverflow.setAttribute('aria-expanded', 'false');
                    }
                });
            }

            const modal = document.getElementById('modalConfirmacion');
            if (modal) {
                function trapFocus(e) {
                    if (e.key !== 'Tab') return;
                    const focusable = Array.from(modal.querySelectorAll('button:not([disabled])'));
                    const first = focusable[0];
                    const last = focusable[focusable.length - 1];
                    if (e.shiftKey) {
                        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
                    } else {
                        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
                    }
                }
                new MutationObserver(() => {
                    if (modal.classList.contains('visible')) {
                        const focusable = modal.querySelectorAll('button:not([disabled])');
                        if (focusable.length) focusable[0].focus();
                        modal.addEventListener('keydown', trapFocus);
                    } else {
                        modal.removeEventListener('keydown', trapFocus);
                    }
                }).observe(modal, { attributes: true, attributeFilter: ['class'] });
            }
        });
    })();
    </script>
    <script type="module" src="admin.js"></script>
</body>
</html>
