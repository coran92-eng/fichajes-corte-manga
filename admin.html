<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Reportes - Fichaje</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // Verificar sesión antes de cargar
        if (!verificarSesion()) {
            window.location.href = 'login.html';
        }

        // Modo oscuro
        const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefiereOscuro) {
            document.body.style.background = '#1f2937';
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        function verificarSesion() {
            const token = sessionStorage.getItem('admin_session');
            const loginTime = sessionStorage.getItem('login_time');

            if (!token || !loginTime) {
                return false;
            }

            // Sesión válida por 8 horas
            const tiempoDecorrido = Date.now() - parseInt(loginTime);
            const ochoHoras = 8 * 60 * 60 * 1000;

            if (tiempoDecorrido > ochoHoras) {
                sessionStorage.removeItem('admin_session');
                sessionStorage.removeItem('login_time');
                return false;
            }

            return true;
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;

        }

        }

        .header-buttons {
            display: flex;
            gap: 10px;

        }

        button {

            border-radius: 8px;

            cursor: pointer;

        }

        @media (prefers-color-scheme: dark) {

            border: 2px solid #e5e7eb;

        .panel-empleados.visible {

        }

        .empleado-tag button:hover {

            flex: 1;

            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        }

        .btn-agregar-empleado {

            color: white;

        }

        .btn-agregar-empleado:hover {
            background: #059669;
        }

        .btn-empleados {
            background: #f59e0b;
            color: white;
        }

        .btn-empleados:hover {
            background: #d97706;
        }

        @media (prefers-color-scheme: dark) {
            .panel-empleados {
                background: #374151;
                border-color: #4b5563;
            }
            .panel-empleados h3 { color: #e5e7eb; }
            .empleado-tag {
                background: #1f2937;
                border-color: #4b5563;
                color: #e5e7eb;
            }
            .form-nuevo-empleado input {
                background: #4b5563;
                color: #e5e7eb;
                border-color: #6b7280;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .tipo {
                font-size: 11px;
                padding: 3px 6px;
            }

            .filtros {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Reportes de Fichaje</h1>
            <div class="header-buttons">
                <button class="btn-export" id="btnExportarExcel" aria-label="Exportar todos los registros a archivo Excel">📥 Exportar a Excel</button>
                <button class="btn-export" id="btnHorasSemana" style="background:#8b5cf6" aria-label="Ver horas por semana">⏱️ Horas por Semana</button>
                <button class="btn-empleados" id="btnEmpleados" aria-label="Gestionar empleados">👥 Empleados</button>
                <button class="btn-guardar-config" id="btnConfig" aria-label="Configuración">⚙️ Config</button>
                <button class="btn-limpiar" id="btnLimpiar" aria-label="Eliminar todos los datos de forma permanente">🗑️ Limpiar datos</button>
                <button class="btn-volver" id="btnVolver" aria-label="Volver a la página de fichaje">← Volver a Fichaje</button>
                <button class="btn-logout" id="btnLogout" aria-label="Cerrar sesión actual">🚪 Cerrar Sesión</button>
            </div>
        </div>

        <div id="message" class="message" role="alert" aria-live="polite" aria-atomic="true"></div>

        <!-- Panel de configuración -->
        <div class="panel-config" id="panelConfig">
            <h3>⚙️ Configuración</h3>
            <div class="config-fila">
                <label for="inputWebhook">URL de Google Apps Script (para sincronizar con Sheets)</label>
                <input type="url" id="inputWebhook" placeholder="https://script.google.com/macros/s/.../exec">
                <div class="webhook-estado" id="webhookEstado"></div>
            </div>
            <div class="config-botones">
                <button class="btn-guardar-config" id="btnGuardarConfig">💾 Guardar URL</button>
                <button class="btn-test-webhook" id="btnTestWebhook">🔗 Probar conexión</button>
                <button class="btn-sync" id="btnSyncTodo">☁️ Sincronizar todo con Sheets</button>
            </div>
        </div>

        <!-- Panel gestión de empleados -->
        <div class="panel-empleados" id="panelEmpleados">
            <h3>👥 Gestión de Empleados</h3>
            <div class="empleados-lista" id="empleadosLista"></div>
            <form class="form-nuevo-empleado" id="formNuevoEmpleado">
                <input type="text" id="inputNuevoEmpleado" placeholder="Nombre del nuevo empleado" maxlength="40" autocomplete="off">
                <button type="submit" class="btn-agregar-empleado">+ Añadir</button>
            </form>
        </div>

        <div class="stats" id="stats"></div>

        <!-- Filtros -->
        <div class="filtros" role="search" aria-label="Filtros de búsqueda">
            <div class="filtro-grupo">
                <label for="filtroEmpleado">🔍 Buscar empleado</label>
                <input type="text" id="filtroEmpleado" placeholder="Nombre..." aria-label="Filtrar por nombre de empleado">
            </div>
            <div class="filtro-grupo">
                <label for="filtroFechaDesde">📅 Desde</label>
                <input type="date" id="filtroFechaDesde" aria-label="Fecha inicial del filtro">
            </div>
            <div class="filtro-grupo">
                <label for="filtroFechaHasta">📅 Hasta</label>
                <input type="date" id="filtroFechaHasta" aria-label="Fecha final del filtro">
            </div>
            <button class="btn-limpiar-filtros" id="btnLimpiarFiltros" aria-label="Limpiar todos los filtros">Limpiar filtros</button>
        </div>

        <nav class="tabs" id="tabs" role="tablist" aria-label="Pestañas de reportes"></nav>

        <div id="tabsContent" role="tabpanel"></div>
    </div>

    <!-- Modal de confirmación -->
    <div class="modal" id="modalConfirmacion">
        <div class="modal-content">
            <div class="modal-titulo" id="modalTitulo"></div>
            <div class="modal-mensaje" id="modalMensaje"></div>
            <div class="modal-botones">
                <button class="btn-modal-cancel" id="btnModalCancel">Cancelar</button>
                <button class="btn-modal-confirmar" id="btnModalConfirmar">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'fichajes_data';
        const EMPLEADOS_KEY = 'empleados_list';
        const EMPLEADOS_DEFAULT = ['Albert','Maikel','Carlos','Jecko','Pol','Sonia','Nacho','Claudia'];

        let callbackModal = null;

        document.addEventListener('DOMContentLoaded', () => {
            cargarDatos();
            configurarBotones();
            configurarFiltros();
            configurarModal();
            verificarRespaldos();
            inicializarEmpleados();
            configurarPanelConfig();
        });

        // ── Configuración / Webhook ───────────────────────────────────

        const WEBHOOK_KEY = 'sheets_webhook_url';

        function configurarPanelConfig() {
            const url = localStorage.getItem(WEBHOOK_KEY) || '';
            document.getElementById('inputWebhook').value = url;

            document.getElementById('btnConfig').addEventListener('click', () => {
                document.getElementById('panelConfig').classList.toggle('visible');
                document.getElementById('panelEmpleados').classList.remove('visible');
            });

            document.getElementById('btnGuardarConfig').addEventListener('click', () => {
                const url = document.getElementById('inputWebhook').value.trim();
                if (url && !url.startsWith('https://script.google.com')) {
                    mostrarEstadoWebhook('⚠ La URL no parece de Google Apps Script', 'error');
                    return;
                }
                localStorage.setItem(WEBHOOK_KEY, url);
                mostrarEstadoWebhook('✓ URL guardada correctamente', 'ok');
            });

            document.getElementById('btnTestWebhook').addEventListener('click', async () => {
                const url = document.getElementById('inputWebhook').value.trim();
                if (!url) {
                    mostrarEstadoWebhook('⚠ Introduce una URL primero', 'error');
                    return;
                }
                mostrarEstadoWebhook('⏳ Probando conexión...', 'loading');
                try {
                    await fetch(url, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ test: true, empleado: 'TEST', tipo: 'test', fecha: new Date().toISOString().split('T')[0], hora: '00:00:00', timestamp: Date.now() })
                    });
                    mostrarEstadoWebhook('✓ Conexión correcta — revisa tu hoja de Sheets', 'ok');
                } catch (e) {
                    mostrarEstadoWebhook('✗ Error de conexión: ' + e.message, 'error');
                }
            });

            document.getElementById('btnSyncTodo').addEventListener('click', async () => {
                const url = localStorage.getItem(WEBHOOK_KEY);
                if (!url) {
                    mostrarEstadoWebhook('⚠ Guarda primero la URL del webhook', 'error');
                    return;
                }
                const fichajes = obtenerFichajasDesencriptados();
                if (fichajes.length === 0) {
                    mostrarEstadoWebhook('⚠ No hay fichajes almacenados', 'error');
                    return;
                }
                const btn = document.getElementById('btnSyncTodo');
                btn.disabled = true;
                btn.textContent = '⏳ Sincronizando...';
                mostrarEstadoWebhook(`⏳ Enviando ${fichajes.length} fichajes...`, 'loading');

                let enviados = 0, errores = 0;
                for (const f of fichajes) {
                    try {
                        await fetch(url, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(f)
                        });
                        enviados++;
                    } catch (e) {
                        errores++;
                    }
                    // Pausa pequeña para no saturar el script
                    await new Promise(r => setTimeout(r, 150));
                }

                btn.disabled = false;
                btn.textContent = '☁️ Sincronizar todo con Sheets';
                if (errores === 0) {
                    mostrarEstadoWebhook(`✓ ${enviados} fichajes enviados a Sheets`, 'ok');
                } else {
                    mostrarEstadoWebhook(`⚠ ${enviados} enviados, ${errores} fallaron`, 'error');
                }
            });
        }

        function mostrarEstadoWebhook(texto, tipo) {
            const el = document.getElementById('webhookEstado');
            el.textContent = texto;
            el.className = `webhook-estado ${tipo}`;
        }

        // ── Gestión de empleados ──────────────────────────────────────

        function obtenerListaEmpleados() {
            return JSON.parse(localStorage.getItem(EMPLEADOS_KEY)) || EMPLEADOS_DEFAULT;
        }

        function guardarListaEmpleados(lista) {
            localStorage.setItem(EMPLEADOS_KEY, JSON.stringify(lista));
        }

        function inicializarEmpleados() {
            if (!localStorage.getItem(EMPLEADOS_KEY)) {
                guardarListaEmpleados(EMPLEADOS_DEFAULT);
            }
            renderEmpleados();
        }

        function renderEmpleados() {
            const lista = obtenerListaEmpleados();
            const contenedor = document.getElementById('empleadosLista');
            if (lista.length === 0) {
                contenedor.innerHTML = '<span style="color:#9ca3af;font-size:13px">Sin empleados</span>';
                return;
            }
            contenedor.innerHTML = lista.map(emp => `
                <div class="empleado-tag">
                    ${emp}
                    <button type="button" title="Eliminar ${emp}" onclick="confirmarEliminarEmpleado('${emp.replace(/'/g, "\\'")}')">✕</button>
                </div>
            `).join('');
        }

        function confirmarEliminarEmpleado(nombre) {
            mostrarModal(
                '👤 Eliminar empleado',
                `¿Eliminar a "${nombre}" de la lista? Sus fichajes anteriores se conservarán.`,
                () => {
                    const lista = obtenerListaEmpleados().filter(e => e !== nombre);
                    guardarListaEmpleados(lista);
                    renderEmpleados();
                    mostrarMensaje(`✓ "${nombre}" eliminado`, 'success');
                }
            );
        }

        function configurarFormEmpleados() {
            document.getElementById('formNuevoEmpleado').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('inputNuevoEmpleado');
                const nombre = input.value.trim();

                if (!nombre) return;

                const lista = obtenerListaEmpleados();
                if (lista.some(e => e.toLowerCase() === nombre.toLowerCase())) {
                    mostrarMensaje(`⚠ "${nombre}" ya existe`, 'error');
                    return;
                }

                lista.push(nombre);
                guardarListaEmpleados(lista);
                renderEmpleados();
                input.value = '';
                mostrarMensaje(`✓ "${nombre}" añadido`, 'success');
            });
        }

        function obtenerFichajasDesencriptados() {
            try {
                const encrypted = localStorage.getItem(STORAGE_KEY);
                if (!encrypted) return [];

                const decrypted = CryptoJS.AES.decrypt(encrypted, 'fichaje_key').toString(CryptoJS.enc.Utf8);
                return JSON.parse(decrypted) || [];
            } catch (e) {
                // Si hay datos sin encriptar (versión antigua), devolverlos como están
                try {
                    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
                    if (Array.isArray(data)) {
                        // Migrar a encriptado
                        const encrypted = CryptoJS.AES.encrypt(
                            JSON.stringify(data),
                            'fichaje_key'
                        ).toString();
                        localStorage.setItem(STORAGE_KEY, encrypted);
                        return data;
                    }
                } catch {}
                return [];
            }
        }

        function cargarDatos() {
            const fichajes = obtenerFichajasDesencriptados();

            if (fichajes.length === 0) {
                document.getElementById('tabsContent').innerHTML =
                    '<div class="empty"><p>No hay registros de fichaje aún</p></div>';
                return;
            }

            // Agrupar por empleado
            const porEmpleado = {};
            fichajes.forEach(f => {
                if (!porEmpleado[f.empleado]) {
                    porEmpleado[f.empleado] = [];
                }
                porEmpleado[f.empleado].push(f);
            });

            // Ordenar por empleado
            const empleados = Object.keys(porEmpleado).sort();

            // Crear estadísticas
            mostrarEstadisticas(fichajes, empleados);

            // Crear pestañas (incluir "Cronológico" al inicio)
            crearPestanas(['Cronológico', ...empleados]);

            // Crear contenido de pestañas
            crearContenidoCronologico(fichajes);
            crearContenidoPestanas(porEmpleado, empleados);

            // Detectar y mostrar descansos largos
            detectarDescansosLargos(porEmpleado);
        }

        function crearContenidoCronologico(fichajes) {
            // Ordenar todos los fichajes por fecha y hora (más reciente primero)
            const ordenados = fichajes
                .slice()
                .sort((a, b) => {
                    const fechaA = new Date(a.fecha + ' ' + a.hora);
                    const fechaB = new Date(b.fecha + ' ' + b.hora);
                    return fechaB - fechaA;
                });

            const filas = ordenados
                .map(f => `
                    <tr>
                        <td class="fecha">${f.fecha}</td>
                        <td class="hora">${f.hora}</td>
                        <td><strong>${f.empleado}</strong></td>
                        <td>
                            <span class="tipo ${f.tipo}">
                                ${getTipoLabel(f.tipo)}
                            </span>
                        </td>
                    </tr>
                `)
                .join('');

            const html = `
                <div class="tab-content active" data-tab="Cronológico">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Empleado</th>
                                <th>Tipo</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filas}
                        </tbody>
                    </table>
                </div>
            `;

            const tabsContent = document.getElementById('tabsContent');
            tabsContent.innerHTML = html;
        }

        function detectarDescansosLargos(porEmpleado) {
            const avisoHTML = document.createElement('div');
            avisoHTML.className = 'aviso-descanso';
            let tieneAvisos = false;

            let contenidoAvisos = '<div class="aviso-titulo">⚠️ Descansos que exceden 20 minutos:</div>';

            Object.keys(porEmpleado).forEach(empleado => {
                const fichajes = porEmpleado[empleado]
                    .sort((a, b) => new Date(a.fecha + ' ' + a.hora) - new Date(b.fecha + ' ' + b.hora));

                for (let i = 0; i < fichajes.length - 1; i++) {
                    const actual = fichajes[i];
                    if (actual.tipo === 'inicio_descanso') {
                        const siguiente = fichajes[i + 1];
                        if (siguiente && siguiente.tipo === 'fin_descanso') {
                            const inicio = new Date(actual.fecha + ' ' + actual.hora);
                            const fin = new Date(siguiente.fecha + ' ' + siguiente.hora);
                            const duracion = (fin - inicio) / (1000 * 60); // en minutos

                            if (duracion > 20) {
                                tieneAvisos = true;
                                const minutos = Math.round(duracion);
                                contenidoAvisos += `
                                    <div class="aviso-detalle">
                                        <strong>${empleado}</strong>:
                                        ${actual.hora} - ${siguiente.hora}
                                        (<span class="duracion-descanso">${minutos} min</span>)
                                    </div>
                                `;
                            }
                        }
                    }
                }
            });

            if (tieneAvisos) {
                avisoHTML.innerHTML = contenidoAvisos;
                avisoHTML.classList.add('visible');
                const containerInicio = document.querySelector('[data-tab="Cronológico"]');
                if (containerInicio) {
                    containerInicio.insertAdjacentElement('beforebegin', avisoHTML);
                }
            }
        }

        function mostrarEstadisticas(fichajes, empleados) {
            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-value">${fichajes.length}</div>
                    <div class="stat-label">Total Registros</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${empleados.length}</div>
                    <div class="stat-label">Empleados Activos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${new Date().toLocaleDateString('es-ES')}</div>
                    <div class="stat-label">Fecha de Hoy</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;
        }

        function crearPestanas(empleadosConCronologico) {
            const tabsHtml = empleadosConCronologico
                .map((emp, idx) =>
                    `<button class="tab-btn ${idx === 0 ? 'active' : ''}" data-empleado="${emp}">
                        ${emp === 'Cronológico' ? '📅 Cronológico' : emp}
                    </button>`
                )
                .join('');

            const tabsEl = document.getElementById('tabs');
            tabsEl.innerHTML = tabsHtml;

            tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    document.querySelector(`[data-tab="${e.target.dataset.empleado}"]`).classList.add('active');
                });
            });
        }

        function crearContenidoPestanas(porEmpleado, empleados) {
            const contentHtml = empleados
                .map(emp => {
                    const fichajes = porEmpleado[emp];
                    const filas = fichajes
                        .sort((a, b) => new Date(b.fecha + ' ' + b.hora) - new Date(a.fecha + ' ' + a.hora))
                        .map(f => `
                            <tr>
                                <td class="fecha">${f.fecha}</td>
                                <td class="hora">${f.hora}</td>
                                <td>
                                    <span class="tipo ${f.tipo}">
                                        ${getTipoLabel(f.tipo)}
                                    </span>
                                </td>
                            </tr>
                        `)
                        .join('');

                    return `
                        <div class="tab-content" data-tab="${emp}">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Hora</th>
                                        <th>Tipo</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${filas}
                                </tbody>
                            </table>
                        </div>
                    `;
                })
                .join('');

            document.getElementById('tabsContent').innerHTML += contentHtml;
        }

        function getTipoLabel(tipo) {
            const labels = {
                'entrada': 'Entrada',
                'salida': 'Salida',
                'inicio_descanso': 'Inicio Descanso',
                'fin_descanso': 'Fin Descanso'
            };
            return labels[tipo] || tipo;
        }

        function configurarModal() {
            document.getElementById('btnModalCancel').addEventListener('click', () => {
                document.getElementById('modalConfirmacion').classList.remove('visible');
            });

            document.getElementById('btnModalConfirmar').addEventListener('click', () => {
                if (callbackModal) {
                    callbackModal();
                }
                document.getElementById('modalConfirmacion').classList.remove('visible');
            });
        }

        function mostrarModal(titulo, mensaje, callback) {
            document.getElementById('modalTitulo').textContent = titulo;
            document.getElementById('modalMensaje').textContent = mensaje;
            callbackModal = callback;
            document.getElementById('modalConfirmacion').classList.add('visible');
        }

        function configurarFiltros() {
            const filtroEmpleado = document.getElementById('filtroEmpleado');
            const filtroDesde = document.getElementById('filtroFechaDesde');
            const filtroHasta = document.getElementById('filtroFechaHasta');
            const btnLimpiar = document.getElementById('btnLimpiarFiltros');

            filtroEmpleado?.addEventListener('input', aplicarFiltros);
            filtroDesde?.addEventListener('change', aplicarFiltros);
            filtroHasta?.addEventListener('change', aplicarFiltros);
            btnLimpiar?.addEventListener('click', limpiarFiltros);
        }

        function aplicarFiltros() {
            const empleado = (document.getElementById('filtroEmpleado')?.value || '').toLowerCase();
            const desde = document.getElementById('filtroFechaDesde')?.value;
            const hasta = document.getElementById('filtroFechaHasta')?.value;

            const filas = document.querySelectorAll('tbody tr');
            filas.forEach(fila => {
                let mostrar = true;

                if (empleado) {
                    const celdaEmpleado = fila.querySelector('td:nth-child(3)')?.textContent || '';
                    mostrar = mostrar && celdaEmpleado.toLowerCase().includes(empleado);
                }

                if (desde || hasta) {
                    const fecha = fila.querySelector('td:first-child')?.textContent.trim();
                    if (desde && fecha < desde) mostrar = false;
                    if (hasta && fecha > hasta) mostrar = false;
                }

                fila.style.display = mostrar ? '' : 'none';
            });
        }

        function limpiarFiltros() {
            document.getElementById('filtroEmpleado').value = '';
            document.getElementById('filtroFechaDesde').value = '';
            document.getElementById('filtroFechaHasta').value = '';
            document.querySelectorAll('tbody tr').forEach(fila => fila.style.display = '');
        }

        function verificarRespaldos() {
            const backups = JSON.parse(localStorage.getItem('backups')) || [];
            const lastBackup = localStorage.getItem('last_backup');

            if (lastBackup) {
                const fecha = new Date(parseInt(lastBackup));
                console.log('Último respaldo:', fecha.toLocaleString());
            }
        }

        function configurarBotones() {
            document.getElementById('btnVolver').addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            document.getElementById('btnHorasSemana').addEventListener('click', () => {
                window.location.href = 'horas-semana.html';
            });

            document.getElementById('btnEmpleados').addEventListener('click', () => {
                document.getElementById('panelEmpleados').classList.toggle('visible');
                document.getElementById('panelConfig').classList.remove('visible');
            });

            configurarFormEmpleados();

            document.getElementById('btnExportarExcel').addEventListener('click', () => {
                mostrarModal(
                    '📥 Exportar a Excel',
                    '¿Descargar todos los registros en Excel?',
                    exportarExcel
                );
            });

            document.getElementById('btnLimpiar').addEventListener('click', () => {
                mostrarModal(
                    '🗑️ Eliminar datos',
                    '⚠️ ADVERTENCIA: Esto eliminará TODOS los registros de forma permanente. Esta acción NO se puede deshacer. ¿Continuar?',
                    limpiarDatos
                );
            });

            document.getElementById('btnLogout').addEventListener('click', () => {
                mostrarModal(
                    '🚪 Cerrar sesión',
                    '¿Deseas cerrar tu sesión?',
                    logout
                );
            });
        }

        function logout() {
            sessionStorage.removeItem('admin_session');
            sessionStorage.removeItem('login_time');
            window.location.href = 'login.html';
        }

        function exportarExcel() {
            const fichajes = obtenerFichajasDesencriptados();

            if (fichajes.length === 0) {
                mostrarMensaje('✗ No hay datos para exportar', 'error');
                return;
            }

            mostrarMensaje('⏳ Generando archivo Excel...', 'info');

            // Crear un workbook
            const workbook = XLSX.utils.book_new();

            // Agrupar por empleado
            const porEmpleado = {};
            fichajes.forEach(f => {
                if (!porEmpleado[f.empleado]) {
                    porEmpleado[f.empleado] = [];
                }
                porEmpleado[f.empleado].push({
                    Fecha: f.fecha,
                    Hora: f.hora,
                    Tipo: getTipoLabel(f.tipo)
                });
            });

            // Crear una hoja por empleado
            Object.keys(porEmpleado).sort().forEach(empleado => {
                const datos = porEmpleado[empleado]
                    .sort((a, b) => new Date(b.Fecha + ' ' + b.Hora) - new Date(a.Fecha + ' ' + a.Hora));

                const worksheet = XLSX.utils.json_to_sheet(datos);

                // Ajustar anchos de columna
                worksheet['!cols'] = [
                    { wch: 12 },
                    { wch: 10 },
                    { wch: 15 }
                ];

                XLSX.utils.book_append_sheet(workbook, worksheet, empleado.substring(0, 31));
            });

            // Crear una hoja de resumen
            const resumen = Object.keys(porEmpleado).map(emp => ({
                Empleado: emp,
                'Total Registros': porEmpleado[emp].length,
                'Último Registro': porEmpleado[emp][0].Hora
            }));

            const resumenSheet = XLSX.utils.json_to_sheet(resumen);
            resumenSheet['!cols'] = [
                { wch: 20 },
                { wch: 15 },
                { wch: 15 }
            ];

            XLSX.utils.book_append_sheet(workbook, resumenSheet, 'Resumen');

            // Descargar
            const fecha = new Date().toISOString().split('T')[0];
            XLSX.writeFile(workbook, `Fichaje_${fecha}.xlsx`);

            mostrarMensaje('✓ Archivo exportado correctamente', 'success');
        }

        function limpiarDatos() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem('last_backup');
            localStorage.removeItem('backups');
            mostrarMensaje('✓ Datos eliminados correctamente', 'success');
            setTimeout(() => {
                location.reload();
            }, 1500);
        }

        function mostrarMensaje(texto, tipo) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = texto;
            msgEl.className = `message ${tipo}`;
            setTimeout(() => {
                msgEl.className = 'message';
            }, 3000);
        }
    </script>
</body>
